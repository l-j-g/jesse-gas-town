description = "Coordinate a full Jesse Backtesting Desk evaluation"
formula = "jt-backtest-desk"
version = 1

[vars.objective]
description = "Backtesting objective or tournament theme"
required = true

[vars.strategies]
description = "Comma-separated strategies to evaluate"
required = true

[vars.market]
description = "Exchange, symbol, timeframe, date range, and data source"
default = "Sandbox BTC-USDT futures 1m fixture"

[vars.asset_universe]
description = "Comma-separated assets/symbols to test before HPO"
default = "BTC-USDT, ETH-USDT, SOL-USDT"

[vars.timeframe_universe]
description = "Comma-separated timeframes to test before HPO"
default = "5m, 15m, 1h, 4h"

[vars.leverage_grid]
description = "Comma-separated leverage candidates to evaluate with liquidation and drawdown guardrails"
default = "1x, 2x, 3x"

[[steps]]
id = "intake"
title = "Backtesting Desk intake"
description = """
Use $jesse-gas-town-strategy-lab.

Run Backtesting Desk intake for objective:
{{objective}}

Strategies:
{{strategies}}

Market:
{{market}}

Asset universe:
{{asset_universe}}

Timeframe universe:
{{timeframe_universe}}

Leverage grid:
{{leverage_grid}}

State thesis, route, data assumptions, leverage assumptions, liquidation guardrails, and exact validation sequence. Do not optimize yet.
"""

[[steps]]
id = "baseline-backtests"
title = "Run baseline backtests"
description = """
Use $jesse-gas-town-strategy-lab.

Run baseline correctness checks and backtests for:
{{strategies}}

Use scripts/strategy-lab-cli-env.sh before direct Jesse commands. Report exact commands, metrics, and errors.
"""
needs = ["intake"]

[[steps]]
id = "route-sweep"
title = "Evaluate assets and leverage"
description = """
For each surviving strategy, sweep the approved route space:

Assets: {{asset_universe}}
Timeframes: {{timeframe_universe}}
Leverage grid: {{leverage_grid}}

Keep hyperparameters fixed. Report route-level net profit, profit factor, expectancy, max drawdown, trade count, fee/slippage assumptions, liquidation buffer, and recommended leverage.
"""
needs = ["baseline-backtests"]

[[steps]]
id = "rank"
title = "Rank desk candidates"
description = """
Rank candidates by robustness: lifecycle correctness, asset/timeframe stability, leverage safety, trade count, profit factor, expectancy, drawdown, and parameter risk.

Return reject, revise, hpo-candidate, or paper-trade candidate for each strategy.
"""
needs = ["route-sweep"]

[[steps]]
id = "next-actions"
title = "Create next actions"
description = """
For each candidate, recommend the next Gas Town action: reject, revise implementation, run HPO, add robustness tests, or paper-gate.

Do not prepare live deployment.
"""
needs = ["rank"]
