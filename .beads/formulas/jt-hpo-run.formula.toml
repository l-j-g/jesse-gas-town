description = "Run HPO for a gated Jesse strategy candidate"
formula = "jt-hpo-run"
version = 1

[vars.strategy_name]
description = "Jesse strategy class/name to optimize"
required = true

[vars.hpo_plan]
description = "Approved hyperparameter ranges, objective, data split, and guardrails"
required = true

[vars.route]
description = "Approved asset/timeframe/leverage route from Backtesting Desk"
required = true

[[steps]]
id = "prepare-hpo"
title = "Prepare HPO for {{strategy_name}}"
description = """
Use $jesse-gas-town-strategy-lab.

Prepare HPO for {{strategy_name}} using this approved plan:
{{hpo_plan}}

Approved route:
{{route}}

Confirm parameter ranges are thesis-linked and small. Confirm data split, objective, selected asset/timeframe/leverage route, and leverage guardrails. Do not broaden the search without evidence.
"""

[[steps]]
id = "run-hpo"
title = "Run HPO for {{strategy_name}}"
description = """
Run HPO for {{strategy_name}} only within the approved plan and approved route:
{{route}}

Capture best candidates, objective score, backtest metrics, and logs. Use scripts/strategy-lab-cli-env.sh before Jesse CLI commands.
"""
needs = ["prepare-hpo"]

[[steps]]
id = "post-hpo-review"
title = "Review HPO result for {{strategy_name}}"
description = """
Review best HPO candidates against baseline, nearby parameters, and selected route/leverage assumptions.

Return reject, revise, or paper-gate-ready. Do not recommend direct live trading.
"""
needs = ["run-hpo"]
